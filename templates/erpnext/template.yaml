apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: erpnext-deployment
  title: Deploy ERPNext
  description: |
    Provision a single-tenant ERPNext (Frappe v15) instance on Kubernetes
    via the official frappe/erpnext Helm chart. Generates a GitOps repo,
    ArgoCD Application, TechDocs runbooks, and a fully populated Backstage
    catalog entry with ISO 27001 metadata (owner, data classification,
    criticality, PII flag, lastReviewed).
  tags:
    - erp
    - erpnext
    - frappe
    - kubernetes
    - helm
    - iso27001
spec:
  owner: platform-team
  type: service

  parameters:
    - title: Instance Identity
      required: [name, siteName, owner, environment]
      properties:
        name:
          title: Deployment Name
          type: string
          description: Lowercase, used for namespace + ArgoCD app name
          pattern: '^[a-z][a-z0-9-]{2,30}$'
          default: erpnext-acme
        siteName:
          title: Site Name (FQDN)
          type: string
          description: Frappe site name, must be a valid DNS name
          pattern: '^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$'
          default: erp.homelab.local
        environment:
          title: Environment
          type: string
          enum: [dev, staging, prod]
          default: dev
        owner:
          title: Owner Team
          type: string
          description: Backstage Group that owns this instance
          default: platform-team
          ui:field: OwnerPicker
          ui:options:
            allowedKinds: [Group]

    - title: Compliance Metadata (ISO 27001)
      required: [dataClassification, criticality, containsPII]
      properties:
        dataClassification:
          title: Data Classification
          type: string
          enum: [public, internal, confidential, restricted]
          default: confidential
        criticality:
          title: Business Criticality
          type: string
          enum: [low, medium, high, critical]
          default: high
        containsPII:
          title: Contains PII / personal data?
          type: boolean
          default: true
        dataRetentionDays:
          title: Backup retention (days)
          type: integer
          default: 35
          minimum: 7

    - title: ERPNext Configuration
      required: [adminEmail, frappeVersion]
      properties:
        adminEmail:
          title: Administrator Email
          type: string
          format: email
        frappeVersion:
          title: Frappe / ERPNext branch
          type: string
          enum: [version-15]
          default: version-15
        installApps:
          title: Apps to install
          type: array
          items:
            type: string
            enum: [erpnext, hrms, payments, crm]
          uniqueItems: true
          default: [erpnext]
        size:
          title: Sizing profile
          type: string
          enum: [small, medium, large]
          default: small
        storageSize:
          title: Sites volume size
          type: string
          default: 20Gi
          enum: [10Gi, 20Gi, 50Gi, 100Gi]

    - title: Secrets (Vault)
      description: |
        Secrets are NEVER stored in git. The template only records the Vault
        path; ExternalSecrets / vault-injector resolves them at runtime.
      required: [vaultPath]
      properties:
        vaultPath:
          title: Vault KV path
          type: string
          default: kv/erpnext/dev/erpnext-acme
          description: Must contain keys = admin_password, db_root_password, encryption_key

    - title: Repository
      required: [repoUrl]
      properties:
        repoUrl:
          title: GitOps repo to create
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts: [github.com]

  steps:
    - id: fetch-base
      name: Render skeleton
      action: fetch:template
      input:
        url: ./skeleton
        copyWithoutTemplating:
          - .github/workflows/*
        values:
          name: ${{ parameters.name }}
          siteName: ${{ parameters.siteName }}
          environment: ${{ parameters.environment }}
          owner: ${{ parameters.owner }}
          dataClassification: ${{ parameters.dataClassification }}
          criticality: ${{ parameters.criticality }}
          containsPII: ${{ parameters.containsPII }}
          dataRetentionDays: ${{ parameters.dataRetentionDays }}
          adminEmail: ${{ parameters.adminEmail }}
          frappeVersion: ${{ parameters.frappeVersion }}
          installApps: ${{ parameters.installApps }}
          size: ${{ parameters.size }}
          storageSize: ${{ parameters.storageSize }}
          vaultPath: ${{ parameters.vaultPath }}
          repoOwner: ${{ (parameters.repoUrl | parseRepoUrl).owner }}
          repoName: ${{ (parameters.repoUrl | parseRepoUrl).repo }}

    # Split publish:github into atomic steps to work around an upstream race
    # where `publish:github` creates the repo and immediately git-pushes,
    # hitting GitHub's git-server propagation lag with HTTP 404. By creating
    # the repo first, waiting briefly, then pushing as a separate action, we
    # avoid the race entirely.
    - id: create-repo
      name: Create GitHub repository
      action: github:repo:create
      input:
        repoUrl: ${{ parameters.repoUrl }}
        description: "ERPNext GitOps repo for ${{ parameters.name }} (${{ parameters.environment }})"
        defaultBranch: main
        repoVisibility: private

    - id: wait-for-github
      name: Wait for GitHub propagation
      action: debug:wait
      input:
        seconds: 5

    - id: push
      name: Push rendered files
      action: github:repo:push
      input:
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main
        gitCommitMessage: "initial commit: ERPNext ${{ parameters.name }}"

    - id: protect
      name: Protect default branch
      action: github:branch-protection:create
      input:
        repoUrl: ${{ parameters.repoUrl }}
        branch: main
        requireCodeOwnerReviews: true
      # protection is best-effort: a brand-new repo with one initial commit
      # may briefly reject this; the compliance-drift workflow re-checks weekly
      continueOnError: true

    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['create-repo'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: GitOps Repository
        url: ${{ steps['create-repo'].output.remoteUrl }}
      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
    text:
      - title: Next steps
        content: |
          1. Review the generated repo: ${{ steps['create-repo'].output.remoteUrl }}
          2. Populate Vault path `${{ parameters.vaultPath }}` with:
             `admin_password`, `db_root_password`, `encryption_key`
          3. Trigger initial deploy:
             - GitHub Actions: workflow `deploy.yml` (manual `workflow_dispatch`)
             - Or (later) let ArgoCD reconcile `argocd/application.yaml`
          4. Verify in Backstage: pods, logs, Grafana, runbook all linked from
             the entity page.
          5. Mark the entity reviewed (`lastReviewed`) every 6 months — the
             drift-check job will warn you otherwise.
