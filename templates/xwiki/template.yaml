apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: xwiki-deployment
  title: Deploy XWiki
  description: Deploy XWiki wiki platform to Kubernetes
  tags:
    - wiki
    - xwiki
    - kubernetes
    - homelab
spec:
  owner: platform-team
  type: service

  parameters:
    - title: XWiki Configuration
      required:
        - name
        - namespace
      properties:
        name:
          title: Deployment Name
          type: string
          description: Name for your XWiki deployment
          default: xwiki
          pattern: '^[a-z0-9-]+$'
        namespace:
          title: Namespace
          type: string
          description: Kubernetes namespace to deploy to
          default: xwiki

    - title: Database Configuration
      required:
        - dbPassword
      properties:
        dbPassword:
          title: Database Password
          type: string
          description: Password for the PostgreSQL database
          ui:widget: password
        dbSize:
          title: Database Storage Size
          type: string
          description: Storage size for PostgreSQL
          default: 10Gi
          enum:
            - 5Gi
            - 10Gi
            - 20Gi
            - 50Gi

    - title: XWiki Settings
      properties:
        xwikiVersion:
          title: XWiki Version
          type: string
          description: XWiki Docker image version
          default: "16-postgres-tomcat"
          enum:
            - "16-postgres-tomcat"
            - "15-postgres-tomcat"
            - "lts-postgres-tomcat"
        storageSize:
          title: XWiki Storage Size
          type: string
          description: Storage size for XWiki data
          default: 10Gi
          enum:
            - 5Gi
            - 10Gi
            - 20Gi
            - 50Gi
        hostname:
          title: Hostname
          type: string
          description: Hostname for ingress (e.g., xwiki.homelab.local)
          default: xwiki.homelab.local

    - title: Repository Configuration
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository Location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com

  steps:
    - id: fetch-base
      name: Fetch Base Template
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          namespace: ${{ parameters.namespace }}
          dbPassword: ${{ parameters.dbPassword }}
          dbSize: ${{ parameters.dbSize }}
          xwikiVersion: ${{ parameters.xwikiVersion }}
          storageSize: ${{ parameters.storageSize }}
          hostname: ${{ parameters.hostname }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        repoUrl: ${{ parameters.repoUrl }}
        description: "XWiki deployment for ${{ parameters.name }}"
        defaultBranch: main
        repoVisibility: public

    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
    text:
      - title: Deploy to Kubernetes
        content: |
          Run the following commands to deploy XWiki:

          ```bash
          git clone ${{ steps['publish'].output.remoteUrl }}
          cd ${{ parameters.name }}
          kubectl apply -f manifests/
          ```

          Then access XWiki at: https://${{ parameters.hostname }}
