apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ values.name }}
  title: XWiki - ${{ values.name }}
  description: XWiki wiki platform deployment
  annotations:
    # Kubernetes plugin - shows pods, deployments, logs
    backstage.io/kubernetes-id: ${{ values.name }}
    backstage.io/kubernetes-namespace: ${{ values.namespace }}
    backstage.io/kubernetes-label-selector: app=${{ values.name }}
    # GitHub Actions plugin - shows CI/CD workflow runs
    github.com/project-slug: ${{ values.repoOwner }}/${{ values.repoName }}
  tags:
    - wiki
    - xwiki
    - kubernetes
  links:
    - url: https://${{ values.hostname }}
      title: XWiki Portal
      icon: web
    - url: https://github.com/${{ values.repoOwner }}/${{ values.repoName }}
      title: GitHub Repository
      icon: github
spec:
  type: service
  lifecycle: production
  owner: platform-team
  system: homelab
