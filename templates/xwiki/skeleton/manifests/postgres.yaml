---
apiVersion: v1
kind: Secret
metadata:
  name: ${{ values.name }}-postgres-secret
  namespace: ${{ values.namespace }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: "${{ values.dbPassword }}"
  POSTGRES_USER: "xwiki"
  POSTGRES_DB: "xwiki"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ${{ values.name }}-postgres-pvc
  namespace: ${{ values.namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ceph-rbd
  resources:
    requests:
      storage: ${{ values.dbSize }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ${{ values.name }}-postgres
  namespace: ${{ values.namespace }}
  labels:
    app: ${{ values.name }}-postgres
    backstage.io/kubernetes-id: ${{ values.name }}
spec:
  serviceName: ${{ values.name }}-postgres
  replicas: 1
  selector:
    matchLabels:
      app: ${{ values.name }}-postgres
  template:
    metadata:
      labels:
        app: ${{ values.name }}-postgres
        backstage.io/kubernetes-id: ${{ values.name }}
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: ${{ values.name }}-postgres-secret
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: ${{ values.name }}-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ${{ values.name }}-postgres
  namespace: ${{ values.namespace }}
  labels:
    app: ${{ values.name }}-postgres
    backstage.io/kubernetes-id: ${{ values.name }}
spec:
  selector:
    app: ${{ values.name }}-postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
