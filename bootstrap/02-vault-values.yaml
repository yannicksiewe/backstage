## Vault - homelab single-node, file storage on ceph-rbd
## NOT for production. For prod: HA mode + integrated raft + auto-unseal.
server:
  dev:
    enabled: false
  standalone:
    enabled: true
    config: |
      ui = true
      listener "tcp" {
        tls_disable = 1
        address     = "[::]:8200"
        cluster_address = "[::]:8201"
      }
      storage "file" {
        path = "/vault/data"
      }
  dataStorage:
    enabled: true
    size: 5Gi
    storageClass: ceph-rbd
  serviceAccount:
    create: true

ui:
  enabled: true
  serviceType: ClusterIP

injector:
  enabled: false             # we use ExternalSecrets, not the injector
